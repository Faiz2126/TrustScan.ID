<!DOCTYPE html>
<html lang="id">
<head>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg-color: #f8fafc; --sidebar-bg: #ffffff; --card-bg: #ffffff; --text-color: #1e293b; --text-secondary: #64748b; --primary-color: #2563eb; --border-color: #e2e8f0; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        [data-theme="dark"] { --bg-color: #0f172a; --sidebar-bg: #1e293b; --card-bg: #1e293b; --text-color: #f1f5f9; --text-secondary: #94a3b8; --primary-color: #3b82f6; --border-color: #334155; --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; min-height: 100vh; }
        aside { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); padding: 2rem 1.5rem; position: fixed; height: 100vh; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary-color); margin-bottom: 2.5rem; }
        .nav-menu { list-style: none; }
        .nav-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; color: var(--text-secondary); font-weight: 500; text-decoration: none; }
        .nav-item:hover, .nav-item.active { background: var(--primary-color); color: white; }
        main { flex: 1; margin-left: 260px; padding: 2rem 5%; }
        header { display: flex; justify-content: flex-end; margin-bottom: 2rem; position: relative; }
        .user-profile-trigger { display: flex; align-items: center; gap: 10px; cursor: pointer; background: var(--card-bg); padding: 8px 16px; border-radius: 50px; border: 1px solid var(--border-color); box-shadow: var(--shadow); }
        .user-profile-trigger img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        #accountPopup { position: absolute; top: 60px; right: 0; width: 250px; background: var(--card-bg); border-radius: 15px; border: 1px solid var(--border-color); box-shadow: var(--shadow); padding: 20px; display: none; z-index: 1001; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .product-card { background: var(--card-bg); border-radius: 15px; padding: 15px; border: 1px solid var(--border-color); }
        .product-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        .btn-edit { width: 100%; background: #f1f5f9; color: #1e293b; border: none; padding: 8px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; margin-top: 10px; }
        .search-bar { width: 100%; max-width: 400px; padding: 12px 40px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color); margin-bottom: 25px; }

        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .social-item { display: flex; align-items: center; gap: 15px; background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); }
        .social-item input { border: none; background: transparent; width: 100%; outline: none; color: var(--text-color); }
        .btn-primary { background: var(--primary-color); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body data-theme="light">
    <aside>
        <div class="logo">TrustScan.id</div>
        <ul class="nav-menu">
            <a href="umkm-dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> Dasbor</a>
            <a href="umkm-tambah-produk.html" class="nav-item"><i class="fas fa-plus-circle"></i> Tambah Produk</a>
            <a href="umkm-sertifikasi.html" class="nav-item"><i class="fas fa-certificate"></i> Sertifikasi</a>
            <a href="umkm-produksi.html" class="nav-item"><i class="fas fa-calendar-check"></i> Produksi Hari Ini</a>
            <a href="umkm-sosmed.html" class="nav-item active"><i class="fas fa-share-alt"></i> Media Sosial</a>
        </ul>
    </aside>
    <main>

        <header>
            <div class="user-profile-trigger" onclick="togglePopup()">
                <img src="https://ui-avatars.com/api/?name=Manov&background=2563eb&color=fff" alt="User">
                <span style="font-weight: 600;">Entrepreneur</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div id="accountPopup">
    <div style="text-align: center; margin-bottom: 15px;">
        <img src="https://ui-avatars.com/api/?name=Manov&background=2563eb&color=fff" style="width: 50px; border-radius: 50%;">
        <h5 style="margin-top: 10px;">Manov</h5>
        <p style="font-size: 0.7rem; color: var(--text-secondary);">Owner TrustScan Shop</p>
    </div>
    <div style="border-top: 1px solid var(--border-color); padding-top: 10px;">
        <a href="umkm-profile.html" class="nav-item" style="font-size: 0.9rem;">
            <i class="fas fa-user-circle"></i> Pengaturan Profil
        </a>
        
        <a href="umkm-dashboard-settings.html" class="nav-item" style="font-size: 0.9rem;">
            <i class="fas fa-store-alt"></i> Pengaturan Toko
        </a>

        <div class="nav-item" style="font-size: 0.9rem;" onclick="toggleTheme()">
            <i class="fas fa-adjust"></i> <span id="themeLabel">Mode Gelap</span>
        </div>

        <a href="index.html" class="nav-item" style="font-size: 0.9rem; color: #ef4444;">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>
</div>
        </header>

        <h2>Media Sosial & Kontak</h2>
        <div class="social-grid" style="margin-top: 20px;">
            <div class="social-item"><i class="fab fa-whatsapp" style="color:#25D366"></i> <input type="text" placeholder="Nomor WhatsApp"></div>
            <div class="social-item"><i class="fab fa-instagram" style="color:#E1306C"></i> <input type="text" placeholder="Username Instagram"></div>
            
            <div class="social-item"><i class="fab fa-tiktok" style="color:#17002d"></i> <input type="text" placeholder="Username Tiktok"></div>
            <div class="social-item"><i class="fab fa-telegram" style="color:#3097e1"></i> <input type="text" placeholder="Nomor Telegram"></div>
            
            <div class="social-item"><i class="fab fa-facebook" style="color:#005fc4"></i> <input type="text" placeholder="Username Facebook"></div>
            <div class="social-item"><i class="fab fa-twitter" style="color:#000000"></i> <input type="text" placeholder="Username X"></div>
            </div>
        <button class="btn-primary" style="margin-top: 20px;">Simpan Perubahan</button>
    </main>
<script>
    function togglePopup() {
        const popup = document.getElementById('accountPopup');
        popup.style.display = popup.style.display === 'block' ? 'none' : 'block';
    }

    function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        body.setAttribute('data-theme', newTheme);
        document.getElementById('themeLabel').textContent = newTheme === 'light' ? 'Mode Gelap' : 'Mode Terang';
        document.getElementById('themeIcon').className = newTheme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
    }
</script>
</body>
</html>
