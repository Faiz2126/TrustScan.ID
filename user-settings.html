<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan - TrustScan.id</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7fe;
            --card-bg: #ffffff;
            --text-color: #1b2559;
            --text-secondary: #a3aed0;
            --primary-color: #4318ff;
            --nav-bg: rgba(255, 255, 255, 0.8);
            --border-color: #e0e5f2;
            --shadow: 0px 20px 40px rgba(112, 144, 176, 0.1);
            --danger: #ff4d4d;
            --success: #05cd99;
        }

        [data-theme="dark"] {
            --bg-color: #0b1437;
            --card-bg: #111c44;
            --text-color: #ffffff;
            --text-secondary: #8f9bba;
            --primary-color: #7551ff;
            --nav-bg: rgba(17, 28, 68, 0.8);
            --border-color: #1b254b;
            --shadow: 0px 20px 40px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'DM Sans', 'Inter', sans-serif;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 80px;
        }

        /* Navbar (Sama dengan Dashboard) */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 0.8rem 5%;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-color);
            cursor: pointer;
            text-decoration: none;
        }

        /* Layout Pengaturan */
        .settings-container {
            max-width: 1000px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
            padding: 0 5%;
        }

        /* Sidebar Pengaturan */
        .settings-sidebar {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            height: fit-content;
            border: 1px solid var(--border-color);
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 5px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .sidebar-menu li.active {
            background: var(--bg-color);
            color: var(--primary-color);
        }

        .sidebar-menu li:hover:not(.active) {
            background: var(--bg-color);
            color: var(--text-color);
        }

        /* Content Card */
        .settings-content {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        .section-title {
            margin-bottom: 25px;
        }

        .section-title h2 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .section-title p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .profile-upload {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .profile-upload img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-color);
        }

        .btn-save {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .btn-save:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .settings-container {
                grid-template-columns: 1fr;
            }
            .settings-sidebar {
                display: flex;
                overflow-x: auto;
                padding: 10px;
            }
            .sidebar-menu {
                display: flex;
                gap: 10px;
            }
            .sidebar-menu li {
                margin-bottom: 0;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body data-theme="light">

    <nav>
        <a href="dashboard.html" class="logo">TrustScan.id</a>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="themeToggle" onclick="toggleTheme()" style="cursor: pointer; color: var(--text-secondary);">
                <i class="fas fa-moon" id="themeIcon"></i>
            </div>
            <a href="user-dashboard.html" style="text-decoration: none; color: var(--text-color); font-weight: 600; font-size: 0.9rem;">
                <i class="fas fa-arrow-left"></i> Kembali
            </a>
        </div>
    </nav>

    <main class="settings-container">
        <aside class="settings-sidebar">
            <ul class="sidebar-menu">
                <li class="active" onclick="switchTab('profil')"><i class="fas fa-user"></i> Profil</li>
                <li onclick="window.location.href='user-security.html'"><i class="fas fa-shield-alt"></i> Keamanan</li>
                <li onclick="window.location.href='user-notifications.html'"><i class="fas fa-bell"></i> Notifikasi</li>
                <li onclick="window.location.href='user-delete-account.html'" style="color: var(--danger);"><i class="fas fa-trash"></i> Hapus Akun</li>
            </ul>
        </aside>

        <section class="settings-content" id="profile-section">
            <div class="section-title">
                <h2>Pengaturan Profil</h2>
                <p>Perbarui informasi pribadi dan foto profil Anda di sini.</p>
            </div>

            <div class="profile-upload">
                <img src="https://ui-avatars.com/api/?name=User+Manov&background=4318ff&color=fff" id="previewImg" alt="Profile">
                <div>
                    <button class="btn-save" style="padding: 8px 15px; font-size: 0.8rem; width: auto;" onclick="document.getElementById('fileInput').click()">Ganti Foto</button>
                    <input type="file" id="fileInput" hidden onchange="previewFile()">
                    <p style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 5px;">JPG atau PNG, Max 2MB</p>
                </div>
            </div>

            <form onsubmit="return false;">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" value="User Manov" placeholder="Masukkan nama lengkap">
                </div>
                <div class="form-group">
                    <label>Alamat Email</label>
                    <input type="email" value="manov@example.com" placeholder="Email Anda">
                </div>
                <div class="form-group">
                    <label>Nomor Telepon</label>
                    <input type="text" value="081234567890" placeholder="08xxx">
                </div>
                <div class="form-group">
                    <label>Bio Singkat</label>
                    <textarea rows="3" placeholder="Ceritakan sedikit tentang Anda...">Pecinta kuliner dan teknologi.</textarea>
                </div>
                <button class="btn-save" onclick="saveSettings()">Simpan Perubahan</button>
            </form>
        </section>

        <section class="settings-content" id="other-section" style="display: none;">
            <div class="section-title">
                <h2 id="tabTitle">Keamanan</h2>
                <p>Fitur ini sedang dalam pengembangan.</p>
            </div>
            <button class="btn-save" style="background: var(--text-secondary);" onclick="switchTab('profil')">Kembali ke Profil</button>
        </section>
    </main>

    <script>
        // Tab Switching Logic
        function switchTab(tab) {
            const profileSection = document.getElementById('profile-section');
            const otherSection = document.getElementById('other-section');
            const tabTitle = document.getElementById('tabTitle');
            
            // Update Menu Active State
            document.querySelectorAll('.sidebar-menu li').forEach(li => li.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if (tab === 'profil') {
                profileSection.style.display = 'block';
                otherSection.style.display = 'none';
            } else {
                profileSection.style.display = 'none';
                otherSection.style.display = 'block';
                tabTitle.innerText = tab.charAt(0).toUpperCase() + tab.slice(1);
            }
        }

        // Preview Image
        function previewFile() {
            const preview = document.getElementById('previewImg');
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();

            reader.onloadend = function () {
                preview.src = reader.result;
            }

            if (file) {
                reader.readAsDataURL(file);
            }
        }

        // Theme Toggle (Sama dengan dashboard agar sinkron)
        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('themeIcon');
            
            if (body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                themeIcon.className = 'fas fa-sun';
            } else {
                body.setAttribute('data-theme', 'light');
                themeIcon.className = 'fas fa-moon';
            }
        }

        function saveSettings() {
            alert('Pengaturan berhasil disimpan!');
        }
    </script>
</body>
</html>
