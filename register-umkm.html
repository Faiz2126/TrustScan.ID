<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar UMKM - TrustScan.id</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Gaya dasar sama dengan User agar konsisten */
        :root {
            --bg-color: #f8fafc; --card-bg: #ffffff; --text-color: #1e293b;
            --primary-color: #2563eb; --border-color: #e2e8f0;
        }
        [data-theme="dark"] {
            --bg-color: #0f172a; --card-bg: #1e293b; --text-color: #f1f5f9;
            --border-color: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; }

        .reg-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 600px; /* Lebih lebar untuk UMKM */
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary-color); text-align: center; margin-bottom: 1rem; display: block; text-decoration: none; }
        h2 { text-align: center; margin-bottom: 0.5rem; }
        p.subtitle { text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 2rem; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group { margin-bottom: 1.2rem; }
        .form-group.full { grid-column: span 2; }
        
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.8rem; border-radius: 10px;
            border: 1px solid var(--border-color); background: var(--bg-color);
            color: var(--text-color); outline: none; font-size: 0.9rem;
        }

        .btn-reg {
            width: 100%; padding: 1rem; background: var(--primary-color);
            color: white; border: none; border-radius: 10px;
            font-weight: 600; cursor: pointer; margin-top: 1rem;
        }

        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-group.full { grid-column: span 1; } }
    </style>
</head>
<body data-theme="light">

    <div class="reg-card">
        <a href="index.html" class="logo">TrustScan.id <span style="font-weight: 300; font-size: 1rem;">Business</span></a>
        <h2>Daftarkan Bisnis Anda</h2>
        <p class="subtitle">Mulai verifikasi produk dan tingkatkan kepercayaan pelanggan.</p>

        <form onsubmit="event.preventDefault(); alert('Data UMKM Terkirim! Mohon tunggu verifikasi admin.'); window.location.href='index.html';">
            <div class="form-grid">
                <div class="form-group">
                    <label>Nama Pemilik</label>
                    <input type="text" placeholder="Sesuai KTP" required>
                </div>
                <div class="form-group">
                    <label>Nama Toko / UMKM</label>
                    <input type="text" placeholder="Contoh: Bakso Mercon" required>
                </div>
                <div class="form-group">
                    <label>Kategori Bisnis</label>
                    <select required>
                        <option value="">Pilih Kategori</option>
                        <option>Kuliner</option>
                        <option>Fashion</option>
                        <option>Kerajinan</option>
                        <option>Jasa</option>
                        <option>Teknologi</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nomor WA Bisnis</label>
                    <input type="tel" placeholder="08xxxxxxxxxx" required>
                </div>
                <div class="form-group full">
                    <label>Alamat Lengkap Toko</label>
                    <textarea rows="2" placeholder="Jl. Raya No. 123..."></textarea>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Min. 8 Karakter" required>
                </div>
                <div class="form-group">
                    <label>Konfirmasi Password</label>
                    <input type="password" required>
                </div>
            </div>
            
            <button type="submit" class="btn-reg">Daftar sebagai Mitra UMKM</button>
        </form>

        <a href="index.html" style="display: block; text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--primary-color); text-decoration: none;">
            <i class="fas fa-arrow-left"></i> Kembali
        </a>
    </div>

</body>
</html>
