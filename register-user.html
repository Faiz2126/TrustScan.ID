<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Pengguna - TrustScan.id</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc; --card-bg: #ffffff; --text-color: #1e293b;
            --primary-color: #2563eb; --border-color: #e2e8f0;
        }
        [data-theme="dark"] {
            --bg-color: #0f172a; --card-bg: #1e293b; --text-color: #f1f5f9;
            --border-color: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .reg-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary-color); text-align: center; margin-bottom: 1.5rem; display: block; text-decoration: none; }
        h2 { text-align: center; margin-bottom: 0.5rem; }
        p.subtitle { text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 2rem; }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 600; }
        .form-group input {
            width: 100%; padding: 0.8rem 1rem; border-radius: 10px;
            border: 1px solid var(--border-color); background: var(--bg-color);
            color: var(--text-color); outline: none; transition: 0.2s;
        }
        .form-group input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .btn-reg {
            width: 100%; padding: 0.9rem; background: var(--primary-color);
            color: white; border: none; border-radius: 10px;
            font-weight: 600; cursor: pointer; margin-top: 1rem; transition: 0.3s;
        }
        .btn-reg:hover { opacity: 0.9; transform: translateY(-2px); }

        .back-link { display: block; text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--primary-color); text-decoration: none; }
    </style>
</head>
<body data-theme="light">

    <div class="reg-card">
        <a href="index.html" class="logo">TrustScan.id</a>
        <h2>Buat Akun Baru</h2>
        <p class="subtitle">Bergabunglah untuk pengalaman verifikasi yang aman.</p>

        <form onsubmit="event.preventDefault(); alert('Pendaftaran Berhasil! Silakan masuk.'); window.location.href='index.html';">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" placeholder="Contoh: Faizal" required>
            </div>
            <div class="form-group">
                <label>Nomor WhatsApp</label>
                <input type="tel" placeholder="08xxxxxxxxxx" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="nama@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Min. 8 Karakter" required>
            </div>
            
            <button type="submit" class="btn-reg">Daftar Sekarang</button>
        </form>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>
    </div>

    <script>
        // Cek mode dari halaman sebelumnya jika ada
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.body.setAttribute('data-theme', 'dark');
        }
    </script>
</body>
</html>
