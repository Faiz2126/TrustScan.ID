<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk - TrustScan.id</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #f4f7fe; --card-bg: #ffffff; --text-color: #1b2559;
            --text-secondary: #a3aed0; --primary-color: #4318ff;
            --border-color: #e0e5f2; --shadow: 0px 20px 40px rgba(112, 144, 176, 0.1);
        }
        [data-theme="dark"] {
            --bg-color: #0b1437; --card-bg: #111c44; --text-color: #ffffff;
            --text-secondary: #8f9bba; --primary-color: #7551ff; --border-color: #1b254b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-top: 90px; }

        header { position: fixed; top: 0; width: 100%; padding: 0.8rem 5%; background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary-color); cursor: pointer; text-decoration: none; }

        main { max-width: 1000px; margin: 0 auto; padding: 20px 5%; }

        .main-container { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; background: var(--card-bg); padding: 30px; border-radius: 30px; border: 1px solid var(--border-color); animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .product-image { width: 100%; border-radius: 20px; aspect-ratio: 1/1; object-fit: cover; }
        .price-big { font-size: 1.8rem; font-weight: 800; color: var(--primary-color); margin: 15px 0; }
        
        #mapDetail { width: 100%; height: 200px; border-radius: 15px; margin: 20px 0; border: 1px solid var(--border-color); }
        
        .owner-card { display: flex; align-items: center; justify-content: space-between; background: var(--bg-color); padding: 15px; border-radius: 20px; cursor: pointer; border: 1px solid var(--border-color); transition: 0.3s; }
        .owner-card:hover { border-color: var(--primary-color); transform: scale(1.02); }

        .rec-section { margin-top: 50px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .small-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid var(--border-color); cursor: pointer; font-size: 0.85rem; }
        .small-card img { width: 100%; height: 120px; object-fit: cover; }
        .small-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }

        @media (max-width: 768px) { .main-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body data-theme="light">

    <header>
        <a href="user-dashboard.html" class="logo">TrustScan.id</a>
        <a href="user-dashboard.html" style="text-decoration: none; color: var(--text-color); font-weight: 600;"><i class="fas fa-arrow-left"></i> Kembali</a>
    </header>

    <main>
        <div class="main-container">
            <div><img id="pImg" class="product-image"></div>
            <div>
                <span id="pCat" style="color:var(--primary-color); font-weight:700; font-size:0.8rem;">KATEGORI</span>
                <h1 id="pName" style="margin-top:5px;">Nama Produk</h1>
                <div class="price-big" id="pPrice">Rp 0</div>
                <p style="color:var(--text-secondary); font-size:0.9rem; line-height:1.6;">
                    Produk unggulan dari mitra UMKM TrustScan.id yang telah melalui kurasi ketat untuk menjamin kualitas terbaik bagi konsumen.
                </p>

                <div id="mapDetail"></div>

                <div class="owner-card" onclick="goToShopDashboard()">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <img src="https://ui-avatars.com/api/?background=4318ff&color=fff&name=S" id="shopIcon" style="width:40px; border-radius:10px;">
                        <div>
                            <div id="pShop" style="font-weight:700;">Nama Toko</div>
                            <div style="font-size:0.7rem; color:var(--text-secondary);">Lihat Profil Toko <i class="fas fa-external-link-alt"></i></div>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right" style="color:var(--text-secondary);"></i>
                </div>

                <button style="width:100%; padding:15px; background:var(--primary-color); color:white; border:none; border-radius:15px; font-weight:700; margin-top:20px; cursor:pointer;">
                    <i class="fab fa-whatsapp"></i> Pesan Sekarang
                </button>
            </div>
        </div>

        <div class="rec-section">
            <h3 id="recShopTitle">Lainnya dari Toko Ini</h3>
            <div class="product-grid" id="sameShopGrid"></div>
        </div>

        <div class="rec-section">
            <h3>Produk Serupa dari Toko Lain</h3>
            <div class="product-grid" id="otherShopGrid"></div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const products = [
            { id: 1, name: "Bakso Mercon Super", cat: "makanan", shop: "Warung Pak Aris", price: "15.000", coords: [-7.9810, 112.6250], img: "https://images.unsplash.com/photo-1541518763669-27fef04b14ea?w=400" },
            { id: 2, name: "Brown Sugar Boba", cat: "minuman", shop: "Boba Time Malang", price: "12.000", coords: [-7.9520, 112.6150], img: "https://images.unsplash.com/photo-1544434553-9415abc4fb35?w=400" },
            { id: 3, name: "Kaos Polos Cotton", cat: "fashion", shop: "Konveksi Jaya", price: "45.000", coords: [-8.0010, 112.6180], img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400" },
            { id: 4, name: "Micro USB Cable", cat: "elektronik", shop: "Faza Robotika", price: "25.000", coords: [-7.9400, 112.6400], img: "https://images.unsplash.com/photo-1555664424-778a1e5e1b48?w=400" },
            { id: 5, name: "Sate Ayam Madura", cat: "makanan", shop: "Sate Cak Di", price: "20.000", coords: [-7.9700, 112.6300], img: "https://images.unsplash.com/photo-1516684732162-798a0062be99?w=400" },
            { id: 6, name: "Kopi Tubruk Asli", cat: "minuman", shop: "Warkop Cak Ali", price: "8.000", coords: [-7.9600, 112.6200], img: "https://images.unsplash.com/photo-1559496417-e7f25cb247f3?w=400" },
            { id: 7, name: "Hoodie Oversize", cat: "fashion", shop: "Konveksi Jaya", price: "120.000", coords: [-8.0010, 112.6180], img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=400" },
            { id: 8, name: "Arduino Uno R3", cat: "elektronik", shop: "Faza Robotika", price: "95.000", coords: [-7.9400, 112.6400], img: "https://images.unsplash.com/photo-1553406830-ef2513450d76?w=400" }
        ];

        const urlParams = new URLSearchParams(window.location.search);
        const pId = parseInt(urlParams.get('id')) || 1;
        const p = products.find(item => item.id === pId);

        function renderDetail() {
            document.getElementById('pName').innerText = p.name;
            document.getElementById('pPrice').innerText = "Rp " + p.price;
            document.getElementById('pShop').innerText = p.shop;
            document.getElementById('pCat').innerText = p.cat.toUpperCase();
            document.getElementById('pImg').src = p.img;
            document.getElementById('shopIcon').src = `https://ui-avatars.com/api/?background=4318ff&color=fff&name=${p.shop}`;
            document.getElementById('recShopTitle').innerText = "Lainnya dari " + p.shop;

            const map = L.map('mapDetail').setView(p.coords, 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.marker(p.coords).addTo(map).bindPopup(p.shop).openPopup();

            renderRecs();
        }

        function renderRecs() {
            const sameGrid = document.getElementById('sameShopGrid');
            const otherGrid = document.getElementById('otherShopGrid');

            products.forEach(item => {
                if(item.id === p.id) return;
                
                const card = `
                    <div class="small-card" onclick="window.location.href='product-detail.html?id=${item.id}'">
                        <img src="${item.img}">
                        <div style="padding:10px;">
                            <div style="font-weight:700;">${item.name}</div>
                            <div style="color:var(--primary-color); font-weight:700; margin-top:5px;">Rp ${item.price}</div>
                        </div>
                    </div>
                `;

                if(item.shop === p.shop) sameGrid.innerHTML += card;
                else if(item.cat === p.cat) otherGrid.innerHTML += card;
            });
        }

        window.onload = renderDetail;
        // Ganti fungsi lama di product-detail.html dengan ini:
function goToShopDashboard() {
    // Navigasi ke halaman profil publik toko dengan membawa parameter nama toko
    window.location.href = `shop-profile.html?shop=${encodeURIComponent(p.shop)}`;
}
    </script>
</body>
</html>
